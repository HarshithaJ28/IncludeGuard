[tox]
envlist = py{38,39,310,311}, lint, type, coverage, docs
skip_missing_interpreters = true
minversion = 3.20.0

[testenv]
description = Run unit tests
deps = 
    pytest>=6.0
    pytest-cov>=2.12.0
    pytest-timeout>=1.4.0
commands = 
    pytest {posargs:tests/}

[testenv:py{38,39,310,311}]
description = Run tests on Python {3.8,3.9,3.10,3.11}
passenv = CI TRAVIS TRAVIS_*

[testenv:lint]
description = Run linting checks (flake8, black)
skipsdist = true
deps =
    flake8>=3.9.0
    black>=21.0
    isort>=5.0
commands =
    flake8 includeguard tests
    black --check includeguard tests
    isort --check-only includeguard tests

[testenv:lint-fix]
description = Auto-fix linting issues
skipsdist = true
deps =
    black>=21.0
    isort>=5.0
commands =
    black includeguard tests
    isort includeguard tests

[testenv:type]
description = Run type checking (mypy)
skipsdist = true
deps =
    mypy>=0.910
    types-all
commands =
    mypy includeguard

[testenv:coverage]
description = Run tests with coverage reporting
deps =
    {[testenv]deps}
commands =
    pytest --cov=includeguard --cov-report=html --cov-report=term-missing tests/

[testenv:security]
description = Run security checks (bandit, safety)
skipsdist = true
deps =
    bandit>=1.7.0
    safety>=1.10.0
commands =
    bandit -r includeguard
    safety check

[testenv:docs]
description = Build documentation
deps =
    sphinx>=4.0
    sphinx-rtd-theme>=1.0
    sphinx-autodoc-typehints>=1.12.0
commands =
    sphinx-build -b html docs docs/_build/html

[testenv:clean]
description = Clean all generated files
skipsdist = true
deps = 
allowlist_externals = 
    rm
    find
commands =
    rm -rf build dist .eggs *.egg-info
    find . -type d -name __pycache__ -exec rm -rf {{}} +
    find . -type f -name "*.pyc" -delete
    rm -rf .tox .coverage .pytest_cache htmlcov

[gh-actions]
python =
    3.8: py38, lint, type
    3.9: py39, lint, type
    3.10: py310, lint, type
    3.11: py311, lint, type, coverage
