[pytest]
# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:warnings

# Coverage options
# Uncomment to enable coverage reporting
# addopts = --cov=includeguard --cov-report=html --cov-report=term-missing

# Markers for test organization
markers =
    benchmark: marks tests as benchmarks (deselect with '-m "not benchmark"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    edge_case: marks tests as edge case tests
    performance: marks tests as performance tests

# Timeout for tests (require pytest-timeout)
timeout = 300

# Minimum Python version
minversion = 6.0

# Test output
console_output_style = progress

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_file = tests.log
log_file_level = DEBUG

# Xfail handling
xfail_strict = false
